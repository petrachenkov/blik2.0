<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блик - Панель администратора</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .status-new { @apply bg-blue-100 text-blue-800; }
        .status-in_progress { @apply bg-yellow-100 text-yellow-800; }
        .status-waiting_user { @apply bg-orange-100 text-orange-800; }
        .status-resolved { @apply bg-green-100 text-green-800; }
        .status-closed { @apply bg-gray-100 text-gray-800; }
        
        .priority-low { @apply bg-gray-100 text-gray-700; }
        .priority-medium { @apply bg-blue-100 text-blue-700; }
        .priority-high { @apply bg-orange-100 text-orange-700; }
        .priority-critical { @apply bg-red-100 text-red-700; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">🔐 Вход в систему Блик</h2>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Логин AD</label>
                    <input type="text" id="adUsername" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                    <input type="password" id="adPassword" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <button type="submit" 
                        class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition duration-200">
                    Войти
                </button>
            </form>
        </div>
    </div>

    <!-- Main App (hidden until login) -->
    <div id="app" class="hidden">
        <!-- Sidebar -->
        <aside class="fixed left-0 top-0 h-full w-64 bg-gray-800 text-white">
            <div class="p-6">
                <h1 class="text-2xl font-bold">✨ Блик</h1>
                <p class="text-gray-400 text-sm mt-1">Система заявок</p>
            </div>
            <nav class="mt-6">
                <a href="#" onclick="showSection('tickets')" class="flex items-center px-6 py-3 hover:bg-gray-700 transition">
                    <i class="fas fa-ticket-alt w-6"></i>
                    <span>Заявки</span>
                </a>
                <a href="#" onclick="showSection('stats')" class="flex items-center px-6 py-3 hover:bg-gray-700 transition">
                    <i class="fas fa-chart-bar w-6"></i>
                    <span>Статистика</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="ml-64 p-8">
            <!-- Header -->
            <header class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800">Панель управления</h2>
                <div class="flex items-center space-x-4">
                    <span id="adminName" class="text-gray-600"></span>
                    <button onclick="logout()" class="text-red-600 hover:text-red-700">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <!-- Tickets Section -->
            <section id="ticketsSection">
                <!-- Filters -->
                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <div class="flex flex-wrap gap-4">
                        <select id="statusFilter" onchange="loadTickets()" class="px-4 py-2 border rounded-lg">
                            <option value="">Все статусы</option>
                            <option value="new">Новые</option>
                            <option value="in_progress">В работе</option>
                            <option value="waiting_user">Ожидание</option>
                            <option value="resolved">Решены</option>
                            <option value="closed">Закрыты</option>
                        </select>
                        <select id="priorityFilter" onchange="loadTickets()" class="px-4 py-2 border rounded-lg">
                            <option value="">Все приоритеты</option>
                            <option value="low">Низкий</option>
                            <option value="medium">Средний</option>
                            <option value="high">Высокий</option>
                            <option value="critical">Критический</option>
                        </select>
                        <input type="text" id="searchInput" placeholder="Поиск..." 
                               onkeyup="loadTickets()" 
                               class="px-4 py-2 border rounded-lg flex-grow">
                    </div>
                </div>

                <!-- Tickets Table -->
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">#</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Тема</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Пользователь</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Статус</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Приоритет</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ответственный</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Дата</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="ticketsTableBody" class="bg-white divide-y divide-gray-200">
                            <!-- Tickets will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Stats Section -->
            <section id="statsSection" class="hidden">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="text-gray-500 text-sm">Всего заявок</div>
                        <div id="totalTickets" class="text-3xl font-bold text-gray-800">0</div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="text-gray-500 text-sm">В работе</div>
                        <div id="inProgressTickets" class="text-3xl font-bold text-yellow-600">0</div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="text-gray-500 text-sm">Новые</div>
                        <div id="newTickets" class="text-3xl font-bold text-blue-600">0</div>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6">
                        <div class="text-gray-500 text-sm">Решены</div>
                        <div id="resolvedTickets" class="text-3xl font-bold text-green-600">0</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Ticket Detail Modal -->
    <div id="ticketModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-xl font-bold">Заявка #<span id="modalTicketId"></span></h3>
                <button onclick="closeTicketModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div id="ticketDetail" class="space-y-4">
                <!-- Ticket details will be loaded here -->
            </div>
            
            <div class="mt-6 pt-6 border-t">
                <h4 class="font-semibold mb-3">Обновить заявку</h4>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Статус</label>
                        <select id="modalStatus" class="w-full px-3 py-2 border rounded-lg">
                            <option value="new">Новая</option>
                            <option value="in_progress">В работе</option>
                            <option value="waiting_user">Ожидание пользователя</option>
                            <option value="resolved">Решена</option>
                            <option value="closed">Закрыта</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Приоритет</label>
                        <select id="modalPriority" class="w-full px-3 py-2 border rounded-lg">
                            <option value="low">Низкий</option>
                            <option value="medium">Средний</option>
                            <option value="high">Высокий</option>
                            <option value="critical">Критический</option>
                        </select>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-gray-600 mb-1">Назначить исполнителя</label>
                    <select id="modalAdmin" class="w-full px-3 py-2 border rounded-lg">
                        <option value="">Не назначен</option>
                    </select>
                </div>
                <button onclick="updateTicket()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    Сохранить изменения
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let authToken = localStorage.getItem('adminToken');
        let currentTicketId = null;
        let allTickets = [];
        let admins = [];

        // Check if already logged in
        if (authToken) {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadTickets();
            loadAdmins();
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('adUsername').value;
            const password = document.getElementById('adPassword').value;
            
            try {
                // In production, implement proper JWT authentication
                const response = await fetch(`${API_BASE}/auth/ad-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, telegram_id: 'admin_web' })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = 'admin_token_' + Date.now(); // Simplified token
                    localStorage.setItem('adminToken', authToken);
                    document.getElementById('loginModal').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('adminName').textContent = data.message.replace('Добро пожаловать, ', '').replace('!', '');
                    loadTickets();
                    loadAdmins();
                } else {
                    alert(data.message);
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Ошибка входа');
            }
        });

        function logout() {
            localStorage.removeItem('adminToken');
            location.reload();
        }

        async function loadTickets() {
            try {
                const response = await fetch(`${API_BASE}/admin/tickets/`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const data = await response.json();
                allTickets = data.tickets || [];
                
                // Apply filters
                const statusFilter = document.getElementById('statusFilter').value;
                const priorityFilter = document.getElementById('priorityFilter').value;
                const searchInput = document.getElementById('searchInput').value.toLowerCase();
                
                let filtered = allTickets;
                if (statusFilter) filtered = filtered.filter(t => t.status === statusFilter);
                if (priorityFilter) filtered = filtered.filter(t => t.priority === priorityFilter);
                if (searchInput) {
                    filtered = filtered.filter(t => 
                        t.subject.toLowerCase().includes(searchInput) ||
                        t.user_name.toLowerCase().includes(searchInput)
                    );
                }
                
                renderTickets(filtered);
                updateStats();
            } catch (error) {
                console.error('Error loading tickets:', error);
            }
        }

        function renderTickets(tickets) {
            const tbody = document.getElementById('ticketsTableBody');
            tbody.innerHTML = tickets.map(ticket => `
                <tr class="hover:bg-gray-50 cursor-pointer" onclick="openTicketModal(${ticket.id})">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">#${ticket.id}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${escapeHtml(ticket.subject)}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${escapeHtml(ticket.user_name)}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full status-${ticket.status}">
                            ${translateStatus(ticket.status)}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full priority-${ticket.priority}">
                            ${translatePriority(ticket.priority)}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500">${ticket.assigned_admin_name || '—'}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${formatDate(ticket.created_at)}</td>
                    <td class="px-6 py-4 text-sm">
                        <button onclick="event.stopPropagation(); openTicketModal(${ticket.id})" 
                                class="text-blue-600 hover:text-blue-900">
                            <i class="fas fa-edit"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function loadAdmins() {
            try {
                const response = await fetch(`${API_BASE}/admin/tickets/admins`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                admins = data.admins || [];
                
                const select = document.getElementById('modalAdmin');
                select.innerHTML = '<option value="">Не назначен</option>' +
                    admins.map(a => `<option value="${a.id}">${escapeHtml(a.full_name || a.username)}</option>`).join('');
            } catch (error) {
                console.error('Error loading admins:', error);
            }
        }

        async function openTicketModal(ticketId) {
            currentTicketId = ticketId;
            const ticket = allTickets.find(t => t.id === ticketId);
            if (!ticket) return;
            
            document.getElementById('modalTicketId').textContent = ticketId;
            document.getElementById('modalStatus').value = ticket.status;
            document.getElementById('modalPriority').value = ticket.priority;
            document.getElementById('modalAdmin').value = ticket.assigned_admin_id || '';
            
            document.getElementById('ticketDetail').innerHTML = `
                <div>
                    <label class="text-sm text-gray-600">Тема</label>
                    <p class="font-medium">${escapeHtml(ticket.subject)}</p>
                </div>
                <div>
                    <label class="text-sm text-gray-600">Описание</label>
                    <p class="text-gray-800 whitespace-pre-wrap">${escapeHtml(ticket.description)}</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-gray-600">Пользователь</label>
                        <p>${escapeHtml(ticket.user_name)}</p>
                        <p class="text-sm text-gray-500">${ticket.user_email || ''}</p>
                    </div>
                    <div>
                        <label class="text-sm text-gray-600">Создана</label>
                        <p>${formatDate(ticket.created_at)}</p>
                    </div>
                </div>
            `;
            
            document.getElementById('ticketModal').classList.remove('hidden');
            document.getElementById('ticketModal').classList.add('flex');
        }

        function closeTicketModal() {
            document.getElementById('ticketModal').classList.add('hidden');
            document.getElementById('ticketModal').classList.remove('flex');
            currentTicketId = null;
        }

        async function updateTicket() {
            if (!currentTicketId) return;
            
            const status = document.getElementById('modalStatus').value;
            const priority = document.getElementById('modalPriority').value;
            const assigned_admin_id = document.getElementById('modalAdmin').value || null;
            
            try {
                const response = await fetch(`${API_BASE}/admin/tickets/${currentTicketId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        status,
                        priority,
                        assigned_admin_id: assigned_admin_id ? parseInt(assigned_admin_id) : null
                    })
                });
                
                if (response.ok) {
                    alert('Заявка обновлена');
                    closeTicketModal();
                    loadTickets();
                } else {
                    alert('Ошибка обновления');
                }
            } catch (error) {
                console.error('Error updating ticket:', error);
                alert('Ошибка обновления');
            }
        }

        function updateStats() {
            document.getElementById('totalTickets').textContent = allTickets.length;
            document.getElementById('inProgressTickets').textContent = 
                allTickets.filter(t => t.status === 'in_progress').length;
            document.getElementById('newTickets').textContent = 
                allTickets.filter(t => t.status === 'new').length;
            document.getElementById('resolvedTickets').textContent = 
                allTickets.filter(t => t.status === 'resolved').length;
        }

        function showSection(section) {
            document.getElementById('ticketsSection').classList.toggle('hidden', section !== 'tickets');
            document.getElementById('statsSection').classList.toggle('hidden', section !== 'stats');
        }

        // Helper functions
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function translateStatus(status) {
            const translations = {
                'new': 'Новая',
                'in_progress': 'В работе',
                'waiting_user': 'Ожидание',
                'resolved': 'Решена',
                'closed': 'Закрыта'
            };
            return translations[status] || status;
        }

        function translatePriority(priority) {
            const translations = {
                'low': 'Низкий',
                'medium': 'Средний',
                'high': 'Высокий',
                'critical': 'Критический'
            };
            return translations[priority] || priority;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
